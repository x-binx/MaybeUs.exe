<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>relationship.upgrade.exe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;
  color: #00ff9c;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#root {
  width: 100%;
  max-width: 660px;
}
.titlebar {
  background: #1e1e1e;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: 12px 12px 0 0;
  border: 1px solid #2a2a2a;
  border-bottom: none;
}
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }
.titletext { color: #555; font-size: 12px; margin: 0 auto; }
#terminal {
  background: #0a0a0a;
  border: 1px solid #2a2a2a;
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 18px 18px 30px;
  font-size: 15px;
  line-height: 2;
  min-height: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
}
.green  { color: #00ff9c; }
.dim    { color: #546e7a; }
.white  { color: #ffffff; font-weight: bold; }
.pink   { color: #f48fb1; }
.yellow { color: #fff176; }
.red    { color: #ff5252; }
.blue   { color: #4fc3f7; }
.btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
.opt-btn {
  background: transparent;
  border: 1px solid #00ff9c;
  color: #00ff9c;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  padding: 10px 20px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
}
.opt-btn:hover { background: #00ff9c; color: #0a0a0a; }
.barca-btn {
  border-color: #a50044;
  color: #a50044;
}
.barca-btn:hover { background: #a50044; color: #fff; }
.yes-btn {
  background: transparent;
  border: 1px solid #f48fb1;
  color: #f48fb1;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  padding: 12px 30px;
  cursor: pointer;
  border-radius: 4px;
  font-weight: bold;
  transition: all 0.2s;
}
.yes-btn:hover { background: #f48fb1; color: #0a0a0a; }
.no-btn {
  background: transparent;
  border: 1px solid #444;
  color: #444;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  padding: 12px 30px;
  cursor: pointer;
  border-radius: 4px;
}
.cursor-blink {
  display: inline-block;
  width: 8px; height: 14px;
  background: #00ff9c;
  animation: blink 1s infinite;
  vertical-align: middle;
  margin-left: 2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes shake {
  0%   { transform: translate(0,0) skew(0deg); }
  20%  { transform: translate(-3px,2px) skew(-1deg); }
  40%  { transform: translate(3px,-2px) skew(1deg); }
  60%  { transform: translate(-2px,3px) skew(0deg); }
  80%  { transform: translate(3px,-1px) skew(-1deg); }
  100% { transform: translate(0,0) skew(0deg); }
}
.glitch { animation: shake 0.15s infinite; }
</style>
</head>
<body>
<div id="root">
  <div class="titlebar">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="titletext">quiz.exe — level 1</span>
  </div>
  <div id="terminal"></div>
</div>

<script>
const term = document.getElementById('terminal');
const titletext = document.querySelector('.titletext');

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function addBlank() {
  const d = document.createElement('div');
  d.innerHTML = '&nbsp;';
  term.appendChild(d);
  term.scrollTop = term.scrollHeight;
}

async function typeWriter(el, text, speed=20) {
  el.textContent = '';
  for (let ch of text) {
    el.textContent += ch;
    await sleep(speed);
  }
}

async function typeLine(text, cls='green', speed=20) {
  const d = document.createElement('div');
  d.className = cls;
  term.appendChild(d);
  await typeWriter(d, text, speed);
  term.scrollTop = term.scrollHeight;
  return d;
}

// ── LEVEL 1: Romantic ──────────────────────────────────────────────────────
const level1 = [
  {
    q: '>>> print("What do I think when I see your name?")',
    options: ['nothing', 'stress', 'smile 🙂'],
    correct: 'smile 🙂',
    ok:   '  [OK] smile  # expected output',
    fail: '  [~]  the real answer was smile 🙂'
  },
  {
    q: '>>> print("Best notification type?")',
    options: ['group chat', 'spam', 'your message 💬'],
    correct: 'your message 💬',
    ok:   '  [OK] your message  # highest priority',
    fail: '  [~]  your message was the right answer'
  },
  {
    q: '>>> print("Time feels like when I\'m talking to you?")',
    options: ['normal', 'slow', 'too fast ⏳'],
    correct: 'too fast ⏳',
    ok:   '  [OK] too fast  # loop runs too quick',
    fail: '  [~]  it always goes too fast'
  }
];

// ── LEVEL 2: Barça — retry until correct ──────────────────────────────────
const level2 = [
  {
    q: '>>> barca.greatest_player_of_all_time()',
    options: ['Ronaldo 🤢', 'Messi 🐐', 'Neymar'],
    correct: 'Messi 🐐',
    ok:   '  [OK] Messi 🐐  # correct. there was never a debate.',
    fails: [
      '  [X]  WRONG. try again. I\'ll wait. 🙂',
      '  [X]  Still wrong. come on Sara. MESSI. 🐐',
      '  [X]  You\'re testing my patience. ONE more try.'
    ]
  },
  {
    q: '>>> barca.is_the_best_club_in_the_world()',
    options: ['maybe', 'yes obviously 💙❤️', 'I need to think'],
    correct: 'yes obviously 💙❤️',
    ok:   '  [OK] correct answer accepted  # Més que un club 💙❤️',
    fails: [
      '  [X]  There is no "maybe". Try again. 😄',
      '  [X]  No thinking needed. It\'s obvious. 💙❤️',
      '  [X]  Last chance. You already know the answer.'
    ]
  }
];

// ── Run a normal question (once) ───────────────────────────────────────────
async function runQuestion(q, btnClass='opt-btn') {
  addBlank();
  await typeLine(q.q, 'dim', 16);
  addBlank();
  await sleep(250);

  return new Promise(resolve => {
    const row = document.createElement('div');
    row.className = 'btn-row';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = btnClass;
      btn.textContent = '> ' + opt;
      btn.onclick = async () => {
        row.remove();
        const ok = opt === q.correct;
        await typeLine(ok ? q.ok : q.fail, ok ? 'green' : 'red', 18);
        await sleep(450);
        resolve();
      };
      row.appendChild(btn);
    });
    term.appendChild(row);
    term.scrollTop = term.scrollHeight;
  });
}

// ── Run a Barça question — retry until correct ─────────────────────────────
async function runBarcaQuestion(q) {
  let attempt = 0;

  while (true) {
    addBlank();
    await typeLine(q.q, 'dim', 16);
    addBlank();
    await sleep(250);

    const result = await new Promise(resolve => {
      const row = document.createElement('div');
      row.className = 'btn-row';
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn barca-btn';
        btn.textContent = '> ' + opt;
        btn.onclick = async () => {
          row.remove();
          const ok = opt === q.correct;
          if (ok) {
            await typeLine(q.ok, 'green', 18);
            await sleep(500);
            resolve(true);
          } else {
            const msg = q.fails[Math.min(attempt, q.fails.length - 1)];
            await typeLine(msg, 'red', 18);
            await sleep(600);
            attempt++;
            resolve(false);
          }
        };
        row.appendChild(btn);
      });
      term.appendChild(row);
      term.scrollTop = term.scrollHeight;
    });

    if (result) break;
  }
}

// ── MAIN ───────────────────────────────────────────────────────────────────
async function main() {
  await typeLine('>>> launching quiz.exe', 'dim', 22);
  await sleep(300);
  await typeLine('# 3 questions. choose carefully.', 'dim', 18);
  await sleep(500);

  // Level 1
  for (let q of level1) {
    await runQuestion(q, 'opt-btn');
  }

  // Level up transition
  await sleep(700);
  addBlank();
  await typeLine('>>> level_1.complete()', 'dim', 20);
  await sleep(400);
  await typeLine('  [OK] all questions answered', 'green', 18);
  await sleep(400);
  addBlank();
  await typeLine('>>> checking unlock conditions...', 'dim', 20);
  await sleep(700);
  await typeLine('  [OK] new level unlocked: EXPERT MODE 🔓', 'yellow', 18);
  await sleep(400);
  addBlank();
  await typeLine('# WARNING: this level is not for everyone.', 'dim', 18);
  await sleep(300);
  await typeLine('# only real Barça fans can pass.', 'dim', 18);
  await sleep(300);
  await typeLine('# wrong answers will not be accepted.', 'red', 18);
  await sleep(700);

  titletext.textContent = 'quiz.exe — level 2 ⚽ BARÇA MODE';
  addBlank();
  await typeLine('>>> loading barca.py... 💙❤️', 'blue', 20);
  await sleep(800);
  await typeLine('  Més que un club.', 'blue', 22);
  await sleep(700);

  // Level 2 — retry until correct
  for (let q of level2) {
    await runBarcaQuestion(q);
  }

  // Glitch transition
  await sleep(800);
  addBlank();
  await typeLine('>>> barca_quiz.complete()', 'dim', 20);
  await sleep(500);
  await typeLine('  [OK] expert level passed. respect. 💙', 'green', 18);
  await sleep(600);
  addBlank();
  await typeLine('>>> scanning for hidden files...', 'dim', 20);
  await sleep(800);

  document.body.classList.add('glitch');
  await typeLine('  SYSTEM INSTABILITY DETECTED ⚠️', 'red', 18);
  await sleep(700);
  document.body.classList.remove('glitch');

  await typeLine('  ERROR 404: normal quiz not found', 'red', 18);
  await sleep(500);
  addBlank();
  await typeLine('>>> restoring system...', 'dim', 20);
  await sleep(800);
  await typeLine('  ...', 'dim', 80);
  await sleep(700);

  // Reveal
  addBlank();
  titletext.textContent = 'secret.py — loading...';

  const reveal = document.createElement('div');
  reveal.className = 'pink';
  reveal.style.lineHeight = '2.3';
  term.appendChild(reveal);

  const lines = [
    '  I think this stopped being just a quiz',
    '  a while ago...',
    '  ',
    '  So...',
    '  ',
    '  Can I make this part of my life official?'
  ];
  for (let l of lines) {
    const s = document.createElement('div');
    reveal.appendChild(s);
    await typeWriter(s, l, 22);
    await sleep(60);
  }

  await sleep(900);
  addBlank();
  const qEl = document.createElement('div');
  qEl.className = 'white';
  qEl.style.fontSize = '16px';
  qEl.style.marginBottom = '14px';
  term.appendChild(qEl);
  await typeWriter(qEl, 'Will you be my girlfriend? 🙂', 40);

  await sleep(400);
  titletext.textContent = 'final_question.exe';

  return new Promise(resolve => {
    const row = document.createElement('div');
    row.className = 'btn-row';

    const yes = document.createElement('button');
    yes.className = 'yes-btn';
    yes.textContent = 'yes.exe 😄';
    yes.onclick = async () => { row.remove(); await accepted(); resolve(); };

    const no = document.createElement('button');
    no.className = 'no-btn';
    no.textContent = 'no.exe';

    function moveNo(e) {
      if (e) e.preventDefault();
      const maxX = window.innerWidth - 130;
      const maxY = window.innerHeight - 70;
      no.style.position = 'fixed';
      no.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + 'px';
      no.style.top  = Math.max(10, Math.floor(Math.random() * maxY)) + 'px';
    }

    no.addEventListener('click',      moveNo);
    no.addEventListener('touchstart', moveNo, { passive: false });

    row.appendChild(yes);
    row.appendChild(no);
    term.appendChild(row);
    term.scrollTop = term.scrollHeight;
  });
}

async function accepted() {
  addBlank();
  await typeLine('>>> status = "accepted"', 'dim', 22);
  await sleep(300);
  await typeLine('  [OK] committing to heart.db...', 'green', 18);
  await sleep(400);
  await typeLine('  [OK] new relationship initialized 💙❤️', 'green', 18);
  await sleep(400);
  await typeLine('  [OK] happiness += infinity', 'green', 18);
  await sleep(700);
  addBlank();
  const end = document.createElement('div');
  end.className = 'pink';
  end.style.fontSize = '15px';
  term.appendChild(end);
  await typeWriter(end, '  Thank you, Sara. Best output I ever wrote. 💙', 28);
  addBlank();
  const cur = document.createElement('div');
  cur.className = 'dim';
  cur.innerHTML = '>>> <span class="cursor-blink"></span>';
  term.appendChild(cur);
  titletext.textContent = 'relationship.upgrade.exe ✔️';
}

main();
</script>
</body>
</html>
